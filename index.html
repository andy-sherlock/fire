<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FIRE退休模拟器</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont;
background:#f3f4f6;
margin:0;
padding:10px;
}

h1{
text-align:center;
font-size:22px;
margin-bottom:15px;
}

.card{
background:white;
padding:15px;
margin-bottom:12px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.section-title{
font-size:18px;
font-weight:600;
margin-bottom:10px;
}

.row{
display:flex;
align-items:center;
margin-bottom:8px;
}

.label{
flex:1;
font-size:14px;
}

.input{
width:70px;
padding:5px;
border-radius:6px;
border:1px solid #ddd;
text-align:right;
font-size:14px;
}

.unit{
margin-left:4px;
font-size:12px;
color:#777;
}

.result{
font-weight:600;
color:#e11d48;
}

</style>
</head>

<body>

<h1>FIRE退休模拟器</h1>

<div class="card">

<div class="section-title">月度支出</div>

<div id="expense-list"></div>

</div>

<div class="card">

<div class="section-title">年度额外支出</div>

<div class="row">
<div class="label">旅游</div>
<input class="input" id="travel" type="number" value="0">
<span class="unit">/年</span>
</div>

</div>

<div class="card">

<div class="section-title">支出统计</div>

<div class="row">
<div class="label">月总支出</div>
<div class="result" id="monthTotal">0</div>
</div>

<div class="row">
<div class="label">年总支出</div>
<div class="result" id="yearTotal">0</div>
</div>

</div>

<div class="card">

<div class="section-title">FIRE设置</div>

<div class="row">
<div class="label">安全倍数</div>
<input class="input" id="fireMultiple" type="number" value="25">
</div>

<div class="row">
<div class="label">FIRE所需资产</div>
<div class="result" id="fireTarget">0</div>
</div>

</div>

<div class="card">

<div class="section-title">资产模拟</div>

<div class="row">
<div class="label">当前资产</div>
<input class="input" id="asset" type="number" value="500000">
</div>

<div class="row">
<div class="label">投资收益率</div>
<input class="input" id="returnRate" type="number" value="5">
<span class="unit">%</span>
</div>

<div class="row">
<div class="label">通胀率</div>
<input class="input" id="inflation" type="number" value="2.5">
<span class="unit">%</span>
</div>

</div>

<div class="card">

<div class="section-title">模拟结果</div>

<div class="row">
<div class="label">资产可维持年数</div>
<div class="result" id="years">0</div>
</div>

</div>

<script>

const expenses = [
"住房房租",
"餐饮",
"日常消费",
"医保医疗",
"交通出行",
"数码电子",
"娱乐",
"社交",
"恋爱",
"学习",
"其他"
];

const container = document.getElementById("expense-list");

expenses.forEach(name=>{

const row = document.createElement("div");
row.className="row";

row.innerHTML=`
<div class="label">${name}</div>
<input class="input month" type="number" value="0">
<span class="unit">月</span>
<input class="input year" type="number" value="0">
<span class="unit">年</span>
`;

container.appendChild(row);

});

document.addEventListener("input",function(e){

if(e.target.classList.contains("month")){
let yearInput = e.target.parentElement.querySelector(".year");
yearInput.value = (e.target.value*12)||0;
}

if(e.target.classList.contains("year")){
let monthInput = e.target.parentElement.querySelector(".month");
monthInput.value = (e.target.value/12).toFixed(0)||0;
}

calculate();

});

function calculate(){

let monthTotal=0;

document.querySelectorAll(".month").forEach(i=>{
monthTotal+=Number(i.value)||0;
});

let yearTotal = monthTotal*12;

yearTotal += Number(document.getElementById("travel").value)||0;

document.getElementById("monthTotal").innerText=monthTotal;

document.getElementById("yearTotal").innerText=yearTotal;

let fireMultiple = Number(document.getElementById("fireMultiple").value)||25;

let fireTarget = yearTotal*fireMultiple;

document.getElementById("fireTarget").innerText=Math.round(fireTarget);

simulate(yearTotal);

}

function simulate(yearCost){

let asset = Number(document.getElementById("asset").value)||0;

let r = Number(document.getElementById("returnRate").value)/100;

let inflation = Number(document.getElementById("inflation").value)/100;

let cost = yearCost;

let years=0;

while(asset>0 && years<100){

asset = asset*(1+r);

cost = cost*(1+inflation);

asset = asset-cost;

years++;

}

document.getElementById("years").innerText=years;

}

calculate();

</script>

</body>
</html>
